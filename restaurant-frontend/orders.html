<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn Hàng Của Tôi — HUIT Restaurant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span>🍽️</span> HUIT Restaurant
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Trang Chủ</a></li>
                <li><a href="menu.html">Thực Đơn</a></li>
            </ul>
            <div class="nav-actions" id="nav-actions"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <h1 style="font-size: 2.2rem; font-weight: 800; margin-bottom: 2rem;">Lịch Sử Đặt Đơn</h1>

        <div id="orders-list">
            <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
                Đang tải đơn hàng...
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container" style="max-width: 1200px; margin: 0 auto; min-height: auto; padding: 0 2rem;">
            <p style="margin-bottom: 1rem; font-weight: 600;">🍽️ HUIT Restaurant © 2026</p>
            <p style="font-size: 0.85rem; color: var(--text-muted);">Địa chỉ: 140 Lê Trọng Tấn, Tây Thạnh, Tân Phú, TP. HCM</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem("token");
            if (!token) {
                window.location.href = "login.html";
                return;
            }
            loadOrders();
        });

        async function loadOrders() {
            const container = document.getElementById("orders-list");
            
            try {
                const orders = await apiFetch("/orders/my-orders");
                container.innerHTML = "";

                if (!orders || orders.length === 0) {
                    container.innerHTML = `
                        <div class="card" style="text-align: center; padding: 4rem 2rem;">
                            <div style="font-size: 3rem; margin-bottom: 1rem;">📦</div>
                            <h3 style="font-weight:700; margin-bottom:0.5rem;">Bạn chưa đặt đơn hàng nào</h3>
                            <p style="color:var(--text-secondary); margin-bottom:1.5rem;">Hãy khám phá menu món ăn hấp dẫn của chúng tôi.</p>
                            <a href="menu.html" class="btn btn-primary">Đặt Đơn Ngay</a>
                        </div>
                    `;
                    return;
                }

                orders.forEach(order => {
                    const card = document.createElement("div");
                    card.className = "card order-card";
                    
                    let statusClass = "status-pending";
                    let statusLabel = "Chờ xác nhận";

                    if (order.status === "CONFIRMED") {
                        statusClass = "status-confirmed";
                        statusLabel = "Đã xác nhận";
                    } else if (order.status === "COMPLETED") {
                        statusClass = "status-completed";
                        statusLabel = "Đã hoàn thành";
                    } else if (order.status === "CANCELLED") {
                        statusClass = "status-cancelled";
                        statusLabel = "Đã hủy";
                    }

                    // Map items lists
                    let itemsHtml = "";
                    if (order.items && order.items.length > 0) {
                        order.items.forEach(item => {
                            const foodName = item.food ? item.food.name : "Món ăn";
                            const foodPrice = item.food ? item.food.price : 0;
                            itemsHtml += `
                                <li style="display:flex; justify-content:space-between; margin-bottom:0.4rem; font-size:0.95rem;">
                                    <span>${foodName} <strong style="color:var(--accent-orange)">x${item.quantity}</strong></span>
                                    <span>${formatCurrency(foodPrice * item.quantity)}</span>
                                </li>
                            `;
                        });
                    }

                    // Cancel button only for PENDING
                    const showCancelBtn = order.status === "PENDING";

                    card.innerHTML = `
                        <div class="order-header">
                            <div>
                                <span class="order-id">Đơn hàng #${order.id}</span>
                                <span class="order-date" style="margin-left: 1rem;">🕒 ${formatDate(order.orderDate)}</span>
                            </div>
                            <span class="status-badge ${statusClass}">${statusLabel}</span>
                        </div>
                        
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:2rem; margin-bottom:1.5rem; border-bottom:1px solid var(--border-color); padding-bottom:1rem;">
                            <div>
                                <h4 style="margin-bottom:0.5rem; color:var(--text-secondary); font-size:0.9rem;">Thông tin giao nhận</h4>
                                <p style="font-weight:600; margin-bottom:0.25rem;">${order.customerName}</p>
                                <p style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:0.25rem;">📞 ${order.phone}</p>
                                <p style="font-size:0.9rem; color:var(--text-secondary);">📍 ${order.address}</p>
                            </div>
                            <div>
                                <h4 style="margin-bottom:0.5rem; color:var(--text-secondary); font-size:0.9rem;">Món ăn đã chọn</h4>
                                <ul style="list-style:none; padding:0;">
                                    ${itemsHtml}
                                </ul>
                            </div>
                        </div>

                        <div class="order-footer">
                            <div style="font-size: 1.15rem;">Tổng cộng: <span style="color:var(--accent-orange); font-weight:800; font-size:1.3rem;">${formatCurrency(order.totalPrice)}</span></div>
                            ${showCancelBtn ? `<button onclick="cancelOrder(${order.id})" class="btn btn-danger btn-sm">Hủy Đơn Hàng</button>` : ''}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                container.innerHTML = `<div style="text-align: center; padding: 3rem; color: var(--color-danger);">Không thể lấy danh sách đơn hàng.</div>`;
            }
        }

        async function cancelOrder(orderId) {
            if (!confirm("Bạn có chắc chắn muốn hủy đơn hàng này không?")) return;
            
            try {
                const response = await apiFetch(`/orders/${orderId}/status?status=CANCELLED`, {
                    method: "PUT"
                });
                
                if (response) {
                    showToast("Đã hủy đơn hàng thành công.", "success");
                    loadOrders();
                }
            } catch (e) {
                // Already toast handled
            }
        }
    </script>
</body>
</html>
