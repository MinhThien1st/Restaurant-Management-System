<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — HUIT Restaurant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i data-lucide="utensils"></i> HUIT Restaurant
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Trang Chủ</a></li>
                <li><a href="menu.html">Thực Đơn</a></li>
            </ul>
            <div class="nav-actions" id="nav-actions"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div class="auth-wrapper">
            <div class="card">
                <div class="auth-header">
                    <h1>Đăng Nhập</h1>
                    <p>Chào mừng bạn trở lại với HUIT Restaurant</p>
                </div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email đăng nhập</label>
                        <input type="email" id="email" class="form-control" required placeholder="example@gmail.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" class="form-control" required placeholder="••••••">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                        Đăng Nhập
                    </button>
                </form>
                
                <div class="auth-footer">
                    Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // If already logged in, redirect to home
            if (localStorage.getItem("token")) {
                window.location.href = "index.html";
            }

            const form = document.getElementById("login-form");
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                try {
                    const response = await fetch("http://localhost:8080/api/auth/login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || "Email hoặc mật khẩu không chính xác.");
                    }

                    // Save token & user
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("user", JSON.stringify(data.user));

                    showToast("Đăng nhập thành công!", "success");

                    setTimeout(() => {
                        if (data.user.role === "ADMIN") {
                            window.location.href = "admin.html";
                        } else {
                            window.location.href = "index.html";
                        }
                    }, 800);

                } catch (error) {
                    showToast(error.message, "error");
                }
            });
        });
    </script>
</body>
</html>
